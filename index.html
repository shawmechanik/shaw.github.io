<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main:#f8fafc;--bg-card:#ffffff;--text-main:#0f172a;--text-dim:#64748b;--border:#e2e8f0;--accent:#10b981;--shadow:0 4px 6px -1px rgba(0,0,0,0.05);--input-bg:#ffffff; }
        [data-theme="dark"] { --bg-main:#0f172a;--bg-card:#1e293b;--text-main:#f8fafc;--text-dim:#94a3b8;--border:#334155;--shadow:0 10px 15px -3px rgba(0,0,0,0.3);--input-bg:#0f172a; }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg-main);color:var(--text-main);font-family:'Inter',sans-serif;padding:2rem 1rem;min-height:100vh;}
        .container{max-width:850px;margin:0 auto;}
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
        header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(to right,var(--accent),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .btn-utility{background:var(--bg-card);border:1px solid var(--border);color:var(--text-main);padding:8px 12px;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;box-shadow:var(--shadow);}
        .btn-add-res{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:600;}

        .sync-banner{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:2rem;box-shadow:var(--shadow);}
        .sync-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .sync-btns{display:flex;gap:8px;flex-wrap:wrap;}
        .sync-info{font-size:0.85rem;color:var(--text-dim);}
        #sync-status{font-size:0.75rem;font-weight:600;margin-top:4px;}
        .setup-panel{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
        .setup-panel p{font-size:0.78rem;color:var(--text-dim);margin-bottom:8px;line-height:1.6;}
        .setup-panel a{color:#3b82f6;}
        .token-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
        .token-input{flex:1;min-width:200px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text-main);font-family:monospace;font-size:0.82rem;}

        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem;}
        .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;text-align:center;box-shadow:var(--shadow);}
        .stat-label{font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;font-weight:600;}
        .stat-value{font-size:1.8rem;font-weight:700;color:var(--accent);}
        .bar-wrap{background:var(--bg-card);padding:1.5rem;border-radius:16px;border:1px solid var(--border);margin-bottom:2rem;}
        .bar-track{height:10px;background:var(--bg-main);border-radius:10px;overflow:hidden;margin-top:10px;}
        .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#3b82f6);transition:width 0.8s ease;}

        .cats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2rem;}
        .cat-pill{padding:6px 14px;border-radius:20px;font-size:0.85rem;cursor:pointer;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);}
        .cat-pill.active{background:var(--accent);color:white;border-color:var(--accent);}

        .skill-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
        .skill-main{display:flex;align-items:center;gap:1.2rem;padding:1.25rem;cursor:pointer;}
        .ring-wrap{position:relative;width:48px;height:48px;flex-shrink:0;}
        .ring-wrap svg{width:48px;height:48px;transform:rotate(-90deg);}
        .ring-bg{fill:none;stroke:var(--bg-main);stroke-width:4;}
        .ring-fg{fill:none;stroke-width:4;stroke-linecap:round;}
        .ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.7rem;font-weight:700;}
        .skill-info{flex:1;min-width:0;}
        .skill-name{font-size:1.05rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .tag{font-size:0.65rem;padding:2px 8px;border-radius:6px;background:var(--bg-main);border:1px solid var(--border);margin-right:4px;color:var(--text-dim);}
        .btn-action{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg-main);color:var(--text-main);cursor:pointer;}
        .skill-detail{padding:1.5rem;background:var(--bg-main);border-top:1px solid var(--border);}
        .detail-label{font-size:0.75rem;font-weight:700;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;display:block;}
        .notes-area{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text-main);padding:0.8rem;border-radius:10px;margin-bottom:1.5rem;font-family:inherit;}
        .resource-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);padding:8px 12px;border-radius:8px;margin-bottom:6px;border:1px solid var(--border);}
        .resource-link{font-size:0.9rem;color:#3b82f6;text-decoration:none;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%;}
        .add-res-box{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
        .res-input{flex:1;min-width:120px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text-main);font-size:0.85rem;}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal{background:var(--bg-card);padding:2rem;border-radius:20px;width:90%;max-width:450px;}
        .field{margin-bottom:1rem;}
        .field label{font-size:0.8rem;font-weight:600;color:var(--text-dim);}
        .field input,.field select{width:100%;padding:0.8rem;margin-top:5px;border-radius:10px;border:1px solid var(--border);background:var(--bg-main);color:var(--text-main);}
        .modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem;}
    </style>
</head>
<body data-theme="dark">
<div class="container">
    <header>
        <h1>Mastery Tracker</h1>
        <button class="btn-utility" onclick="toggleTheme()"><span id="theme-icon">🌙</span> Mode</button>
    </header>

    <div class="sync-banner">
        <div class="sync-top">
            <div class="sync-info">
                <strong>Cloud Sync</strong> — GitHub Gist backend
                <div id="sync-status">⚪ Not configured</div>
            </div>
            <div class="sync-btns">
                <button class="btn-utility" onclick="pushToGist()">☁️ Push</button>
                <button class="btn-utility" onclick="pullFromGist()">📥 Pull</button>
                <button class="btn-utility" onclick="toggleSetup()">⚙️ Setup</button>
                <button class="btn-utility" onclick="exportData()">📤 Export</button>
            </div>
        </div>
        <div class="setup-panel" id="setup-panel">
            <p>
                <strong>One-time setup per device:</strong><br>
                1. Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens/new</a><br>
                2. Name it anything → tick only <strong>gist</strong> scope → Generate<br>
                3. Copy the token (starts with ghp_) & paste below<br>
                4. Click Save → then Push once from laptop → Pull on mobile
            </p>
            <div class="token-row">
                <input type="password" id="token-input" class="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
                <button class="btn-add-res" onclick="saveToken()">Save Token</button>
                <button class="btn-utility" onclick="clearAll()" style="color:#ef4444">Clear</button>
            </div>
            <div id="gist-info" style="font-size:0.75rem;font-family:monospace;margin-top:8px;color:var(--text-dim);"></div>
        </div>
    </div>

    <div id="app"></div>
</div>

<script>
const SK = 'mastery_v2';
const TK = 'gh_token';
const GK = 'gh_gist_id';
const CATS = ['All','DSA','System Design','Languages','Frameworks','CS Fundamentals','Behavioral'];
const COLORS = {'DSA':'#10b981','System Design':'#3b82f6','Languages':'#f59e0b','Frameworks':'#ec4899','CS Fundamentals':'#8b5cf6','Behavioral':'#f97316'};

let skills = [];
let filter = 'All';
let expanded = new Set();
let showModal = false;

// --- BOOT: load from localStorage ---
function boot() {
    const raw = localStorage.getItem(SK);
    skills = raw ? JSON.parse(raw) : [{id:1,name:'Arrays & Hashing',cat:'DSA',pct:75,priority:'High',notes:'',resources:[]}];
    const theme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', theme);
    document.getElementById('theme-icon').innerText = theme === 'dark' ? '🌙' : '☀️';
    updateGistInfo();
    setStatus(localStorage.getItem(TK) ? '⚪ Token saved — Push or Pull to sync' : '⚪ Not configured');
    render();
}

function save() { localStorage.setItem(SK, JSON.stringify(skills)); }

function toggleTheme() {
    const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', t);
    document.getElementById('theme-icon').innerText = t === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('theme', t);
}

function toggleSetup() {
    const p = document.getElementById('setup-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function setStatus(msg) {
    const el = document.getElementById('sync-status');
    if (el) el.innerText = msg;
}

function updateGistInfo() {
    const el = document.getElementById('gist-info');
    const gid = localStorage.getItem(GK);
    if (el && gid) el.innerText = 'Gist ID: ' + gid;
}

function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) { alert('Paste your token first'); return; }
    localStorage.setItem(TK, t);
    document.getElementById('token-input').value = '';
    setStatus('✅ Token saved — click Push from laptop, Pull on mobile');
    alert('Token saved! Now click ☁️ Push on the device that has your data, then 📥 Pull on the other device.');
}

function clearAll() {
    if (!confirm('Remove token & gist link from this device?')) return;
    localStorage.removeItem(TK);
    localStorage.removeItem(GK);
    document.getElementById('gist-info').innerText = '';
    setStatus('⚪ Not configured');
}

function exportData() {
    const b = new Blob([JSON.stringify(skills,null,2)],{type:'application/json'});
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href=u; a.download=`mastery-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(u);
}

// --- GIST PUSH ---
async function pushToGist() {
    const token = localStorage.getItem(TK);
    if (!token) { alert('No token found. Click ⚙️ Setup first.'); return; }
    setStatus('⏳ Pushing...');
    try {
        const body = { description:'Mastery Tracker Sync', public:false, files:{'mastery-data.json':{ content: JSON.stringify(skills,null,2) }} };
        const gistId = localStorage.getItem(GK);
        const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
        const method = gistId ? 'PATCH' : 'POST';
        const res = await fetch(url, {
            method,
            headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || res.status);
        }
        const data = await res.json();
        localStorage.setItem(GK, data.id);
        updateGistInfo();
        setStatus('✅ Pushed at ' + new Date().toLocaleTimeString());
    } catch(e) {
        setStatus('❌ Push failed: ' + e.message);
        alert('Push failed: ' + e.message);
    }
}

// --- GIST PULL ---
async function pullFromGist() {
    const token = localStorage.getItem(TK);
    const gistId = localStorage.getItem(GK);
    if (!token) { alert('No token. Click ⚙️ Setup first.'); return; }
    if (!gistId) { alert('No Gist ID found. Push from your main device first, then Pull here.'); return; }
    setStatus('⏳ Pulling...');
    try {
        const res = await fetch('https://api.github.com/gists/' + gistId, {
            headers: { 'Authorization': 'token ' + token }
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || res.status);
        }
        const data = await res.json();
        const content = data.files['mastery-data.json'] && data.files['mastery-data.json'].content;
        if (!content) throw new Error('File not found in Gist');
        const parsed = JSON.parse(content);
        if (!Array.isArray(parsed)) throw new Error('Invalid data in Gist');
        skills = parsed;
        localStorage.setItem(SK, JSON.stringify(skills));
        setStatus('✅ Pulled at ' + new Date().toLocaleTimeString());
        render();
        alert('✅ Data pulled successfully! ' + skills.length + ' topics loaded.');
    } catch(e) {
        setStatus('❌ Pull failed: ' + e.message);
        alert('Pull failed: ' + e.message);
    }
}

// --- RENDER ---
function render() {
    const app = document.getElementById('app');
    const shown = filter === 'All' ? skills : skills.filter(s=>s.cat===filter);
    const avg = skills.length ? Math.round(skills.reduce((a,b)=>a+b.pct,0)/skills.length) : 0;
    app.innerHTML = `
        <div class="stats-row">
            <div class="stat-card"><div class="stat-label">Overall</div><div class="stat-value">${avg}%</div></div>
            <div class="stat-card"><div class="stat-label">Topics</div><div class="stat-value">${skills.length}</div></div>
            <div class="stat-card"><div class="stat-label">Done</div><div class="stat-value">${skills.filter(s=>s.pct===100).length}</div></div>
        </div>
        <div class="bar-wrap">
            <div style="display:flex;justify-content:space-between;font-weight:600;font-size:0.85rem;"><span>Road to Mastery</span><span>${avg}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${avg}%"></div></div>
        </div>
        <div class="cats">${CATS.map(c=>`<div class="cat-pill ${filter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`).join('')}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
            <h2 style="font-size:1.1rem;">${filter} Topics</h2>
            <button class="btn-add-res" onclick="openModal()">+ New Topic</button>
        </div>
        <div>
            ${shown.map(s=>`
                <div class="skill-card">
                    <div class="skill-main" onclick="toggleExpand(${s.id})">
                        <div class="ring-wrap">
                            <svg viewBox="0 0 44 44">
                                <circle class="ring-bg" cx="22" cy="22" r="18"/>
                                <circle class="ring-fg" cx="22" cy="22" r="18" stroke="${COLORS[s.cat]||'#10b981'}" stroke-dasharray="113.1" stroke-dashoffset="${113.1-(s.pct/100)*113.1}"/>
                            </svg>
                            <span class="ring-pct">${s.pct}%</span>
                        </div>
                        <div class="skill-info">
                            <div class="skill-name">${s.name}</div>
                            <div><span class="tag">${s.cat}</span><span class="tag">${s.priority}</span></div>
                        </div>
                        <div onclick="event.stopPropagation()">
                            <button class="btn-action" onclick="adj(${s.id},-10)">−</button>
                            <button class="btn-action" onclick="adj(${s.id},10)">+</button>
                            <button class="btn-action" style="border:none;color:#ef4444" onclick="del(${s.id})">×</button>
                        </div>
                    </div>
                    ${expanded.has(s.id)?`
                        <div class="skill-detail">
                            <span class="detail-label">Notes</span>
                            <textarea class="notes-area" rows="3" onchange="updateNotes(${s.id},this.value)">${s.notes||''}</textarea>
                            <span class="detail-label">Resources</span>
                            ${(s.resources||[]).map((r,i)=>`
                                <div class="resource-row">
                                    <a href="${r.url}" target="_blank" class="resource-link">🔗 ${r.label}</a>
                                    <button style="background:none;border:none;color:var(--text-dim);cursor:pointer" onclick="delRes(${s.id},${i})">×</button>
                                </div>`).join('')}
                            <div class="add-res-box">
                                <input type="text" id="rl-${s.id}" class="res-input" placeholder="Label">
                                <input type="text" id="ru-${s.id}" class="res-input" placeholder="URL">
                                <button class="btn-add-res" onclick="addRes(${s.id})">Add</button>
                            </div>
                            <div style="margin-top:1.5rem;display:flex;align-items:center;gap:10px;">
                                <input type="range" style="flex:1" min="0" max="100" step="5" value="${s.pct}" oninput="setPct(${s.id},+this.value)">
                                <span style="font-size:0.75rem;font-weight:600;color:var(--text-dim);min-width:36px">${s.pct}%</span>
                            </div>
                        </div>`:''}
                </div>`).join('')}
        </div>
        ${showModal?`
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
                <div class="modal">
                    <h2 style="margin-bottom:1rem">Add Topic</h2>
                    <div class="field"><label>Name</label><input type="text" id="f-name"></div>
                    <div class="field"><label>Category</label><select id="f-cat">${CATS.filter(c=>c!=='All').map(c=>`<option>${c}</option>`).join('')}</select></div>
                    <div class="field"><label>Priority</label><select id="f-pri"><option>High</option><option>Medium</option><option>Low</option></select></div>
                    <div class="modal-btns">
                        <button onclick="closeModal()" style="background:none;border:none;color:var(--text-dim);cursor:pointer">Cancel</button>
                        <button class="btn-add-res" onclick="saveNew()">Create</button>
                    </div>
                </div>
            </div>`:''}
    `;
}

window.setFilter = c=>{filter=c;render();};
window.toggleExpand = id=>{expanded.has(id)?expanded.delete(id):expanded.add(id);render();};
window.adj = (id,v)=>{const s=skills.find(x=>x.id===id);if(s){s.pct=Math.max(0,Math.min(100,s.pct+v));save();render();}};
window.setPct = (id,v)=>{const s=skills.find(x=>x.id===id);if(s){s.pct=v;save();render();}};
window.updateNotes = (id,v)=>{const s=skills.find(x=>x.id===id);if(s){s.notes=v;save();}};
window.del = id=>{if(confirm('Delete?')){skills=skills.filter(x=>x.id!==id);save();render();}};
window.addRes = id=>{
    const l=document.getElementById('rl-'+id).value.trim();
    const u=document.getElementById('ru-'+id).value.trim();
    if(!l||!u)return;
    const s=skills.find(x=>x.id===id);
    if(s){if(!s.resources)s.resources=[];s.resources.push({label:l,url:u});save();render();}
};
window.delRes = (id,i)=>{const s=skills.find(x=>x.id===id);if(s){s.resources.splice(i,1);save();render();}};
window.openModal = ()=>{showModal=true;render();};
window.closeModal = ()=>{showModal=false;render();};
window.saveNew = ()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name)return;
    skills.push({id:Date.now(),name,cat:document.getElementById('f-cat').value,priority:document.getElementById('f-pri').value,pct:0,notes:'',resources:[]});
    save();closeModal();
};

boot();
</script>
</body>
</html>
